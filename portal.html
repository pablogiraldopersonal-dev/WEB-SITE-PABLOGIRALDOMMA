<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Portal · Pablo Giraldo MMA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0a0a0a;--bg2:#111;--bg3:#1a1a1a;--border:#222;
      --red:#cc0000;--red2:#990000;--green:#22c55e;--yellow:#f59e0b;
      --white:#f0f0f0;--gray:#888;
      --ft:'Oswald',sans-serif;--fb:'Inter',sans-serif;
      --nav:60px;--tabs:52px;--bot:64px;
    }
    html,body{height:100%;background:var(--bg);color:var(--white);font-family:var(--fb);font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased}
    a{color:inherit;text-decoration:none}
    button{cursor:pointer;font-family:var(--fb)}
    input,select,textarea{font-family:var(--fb)}
    img{display:block;max-width:100%}

    /* ── NAVBAR ─────────────────── */
    #navbar{
      position:fixed;top:0;left:0;right:0;height:var(--nav);
      background:#000;border-bottom:1px solid var(--border);
      z-index:1000;display:none;align-items:center;
    }
    .nav-in{
      width:100%;max-width:1200px;margin:0 auto;
      padding:0 20px;display:flex;align-items:center;gap:12px;
    }
    .nav-logo img{height:45px;filter:invert(1)}
    .nav-user{font-size:13px;color:var(--gray);margin-left:auto;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px}
    .nav-logout{
      background:transparent;border:1px solid var(--border);
      color:var(--gray);padding:6px 12px;border-radius:4px;
      font-size:13px;flex-shrink:0;transition:border-color .2s,color .2s;
    }
    .nav-logout:hover{border-color:var(--red);color:var(--red)}
    #nav-burger{display:none;background:transparent;border:none;color:#fff;font-size:24px;padding:4px;margin-left:auto}

    /* ── DRAWER MÓVIL ─────────────── */
    #nav-drawer{
      display:none;flex-direction:column;position:fixed;
      top:var(--nav);left:0;right:0;background:#000;
      border-bottom:1px solid var(--border);z-index:998;
    }
    #nav-drawer.open{display:flex}
    #nav-drawer a,#nav-drawer button{
      padding:14px 24px;border-bottom:1px solid var(--border);
      color:var(--gray);font-size:15px;font-family:var(--fb);
      background:transparent;border-left:none;border-right:none;border-top:none;text-align:left;
      transition:color .2s;
    }
    #nav-drawer a:hover,#nav-drawer button:hover{color:#fff}

    /* ── LOGIN ──────────────────── */
    #screen-login{
      display:flex;flex-direction:column;align-items:center;
      justify-content:center;min-height:100vh;padding:24px;position:relative;
    }
    #screen-login a.back-home{
      position:fixed;top:20px;left:24px;
      color:var(--red);font-family:var(--ft);font-size:14px;
      letter-spacing:2px;text-decoration:none;z-index:10;
    }
    .login-box{
      background:var(--bg2);border:1px solid #333;
      border-radius:10px;padding:40px 32px;width:100%;max-width:400px;
    }
    .login-logo{text-align:center;margin-bottom:8px}
    .login-logo img{height:100px;filter:invert(1);margin:0 auto}
    .login-sub{text-align:center;font-size:13px;color:var(--gray);margin-bottom:28px}
    .login-box .form-group{margin-bottom:16px}
    .login-box label{display:block;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--gray);margin-bottom:5px}
    .login-box input{width:100%;background:#1a1a1a;border:1px solid #333;color:var(--white);padding:11px 14px;border-radius:5px;font-size:14px;transition:border-color .2s}
    .login-box input:focus{outline:none;border-color:var(--red)}
    #alert-login{margin-bottom:12px}

    /* ── APP ─────────────────────── */
    #app{display:none;padding-top:var(--nav)}

    /* Desktop tabs arriba */
    #tab-bar{
      background:#000;border-bottom:1px solid var(--border);
      display:flex;gap:0;position:sticky;top:var(--nav);z-index:900;
    }
    .tab-btn{
      flex:1;padding:14px 8px;background:transparent;border:none;
      color:var(--gray);font-family:var(--ft);font-size:13px;
      font-weight:600;letter-spacing:1px;text-transform:uppercase;
      border-bottom:3px solid transparent;transition:color .2s,border-color .2s;
      display:flex;flex-direction:column;align-items:center;gap:3px;
    }
    .tab-btn .tab-icon{font-size:18px}
    .tab-btn:hover{color:#fff}
    .tab-btn.active{color:#fff;border-bottom-color:var(--red)}

    /* Mobile: tabs abajo fijas */
    @media(max-width:768px){
      #tab-bar{
        position:fixed;bottom:0;left:0;right:0;top:auto;
        border-top:1px solid var(--border);border-bottom:none;
        height:var(--bot);z-index:1000;
      }
      .tab-btn{font-size:10px;padding:6px 4px;letter-spacing:0.5px}
      .tab-btn .tab-icon{font-size:20px}
      #app{padding-bottom:var(--bot)}
      #nav-burger{display:block}
      .nav-user,.nav-logout{display:none}
    }

    /* ── CONTENT ─────────────────── */
    #tab-content{padding:20px 16px;max-width:1100px;margin:0 auto}
    @media(min-width:769px){#tab-content{padding:28px 24px}}

    /* Sub-tabs (detalle alumno) */
    #sub-tabs{
      display:flex;gap:2px;overflow-x:auto;scrollbar-width:none;
      border-bottom:1px solid var(--border);margin-bottom:20px;
    }
    #sub-tabs::-webkit-scrollbar{display:none}
    .sub-tab-btn{
      flex-shrink:0;padding:10px 16px;background:transparent;border:none;
      color:var(--gray);font-family:var(--ft);font-size:12px;
      font-weight:600;letter-spacing:1px;text-transform:uppercase;
      border-bottom:2px solid transparent;transition:color .2s,border-color .2s;
      white-space:nowrap;
    }
    .sub-tab-btn.active{color:#fff;border-bottom-color:var(--red)}
    .sub-tab-btn:hover{color:#fff}

    /* ── CARDS ───────────────────── */
    .card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:20px}
    .card+.card{margin-top:12px}
    .card-title{font-family:var(--ft);font-size:15px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:14px;color:var(--white)}
    .card-sm{padding:14px 16px}

    /* Alumno card list */
    .alumno-card{
      background:var(--bg2);border:1px solid var(--border);border-radius:8px;
      padding:16px;display:flex;align-items:center;gap:14px;
      cursor:pointer;transition:border-color .2s,background .2s;margin-bottom:10px;
    }
    .alumno-card:hover{border-color:var(--red);background:#130000}
    .a-avatar{
      width:52px;height:52px;border-radius:50%;background:var(--bg3);
      border:2px solid var(--border);display:flex;align-items:center;
      justify-content:center;font-family:var(--ft);font-size:20px;
      font-weight:700;color:var(--red);flex-shrink:0;overflow:hidden;
    }
    .a-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
    .a-info{flex:1;min-width:0}
    .a-name{font-family:var(--ft);font-size:17px;font-weight:700;color:#fff}
    .a-meta{font-size:12px;color:var(--gray);margin-top:2px}
    .a-right{text-align:right;flex-shrink:0}
    .a-clases{font-family:var(--ft);font-size:22px;font-weight:700;color:var(--red);line-height:1}
    .a-dias{font-size:11px;color:var(--gray);margin-top:2px}

    /* ── FORMS ───────────────────── */
    .form-section{margin-bottom:24px}
    .form-section-title{font-family:var(--ft);font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--red);margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid var(--border)}
    .form-group{margin-bottom:14px}
    .form-group label{display:block;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--gray);margin-bottom:5px}
    .form-group input,.form-group select,.form-group textarea{
      width:100%;background:#1a1a1a;border:1px solid #333;color:var(--white);
      padding:10px 14px;border-radius:5px;font-size:14px;transition:border-color .2s;
    }
    .form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--red)}
    .form-group textarea{resize:vertical;min-height:80px}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    @media(max-width:480px){.form-row{grid-template-columns:1fr}}

    /* ── BUTTONS ─────────────────── */
    .btn{display:inline-flex;align-items:center;gap:7px;padding:11px 20px;border-radius:5px;font-size:14px;font-weight:600;border:none;transition:opacity .2s,transform .15s;text-decoration:none;cursor:pointer;font-family:var(--fb)}
    .btn:hover{opacity:.85;transform:translateY(-1px)}
    .btn:active{transform:translateY(0)}
    .btn-primary{background:var(--red);color:#fff}
    .btn-primary:hover{background:var(--red2);opacity:1}
    .btn-secondary{background:var(--bg3);color:var(--white);border:1px solid var(--border)}
    .btn-green{background:#16a34a;color:#fff}
    .btn-yellow{background:var(--yellow);color:#000}
    .btn-full{width:100%;justify-content:center}
    .btn-lg{padding:14px 24px;font-size:15px;min-height:48px}
    .btn-sm{padding:7px 14px;font-size:13px}

    /* ── BADGES / ALERTS ─────────── */
    .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
    .badge-red{background:rgba(204,0,0,.15);color:var(--red)}
    .badge-green{background:rgba(34,197,94,.15);color:var(--green)}
    .badge-yellow{background:rgba(245,158,11,.15);color:var(--yellow)}
    .badge-gray{background:rgba(136,136,136,.15);color:var(--gray)}
    .alert{padding:12px 16px;border-radius:5px;font-size:14px;border-left:3px solid;margin-bottom:14px}
    .alert-error{background:rgba(204,0,0,.1);border-color:var(--red);color:#f87171}
    .alert-success{background:rgba(34,197,94,.1);border-color:var(--green);color:#86efac}
    .alert-warn{background:rgba(245,158,11,.1);border-color:var(--yellow);color:#fcd34d}
    .warning-box{background:rgba(204,0,0,.08);border:1px solid rgba(204,0,0,.3);border-radius:6px;padding:12px 16px;font-size:13px;color:#fca5a5;margin-bottom:16px}

    /* ── PROGRESS ────────────────── */
    .prog-wrap{background:#1a1a1a;border-radius:20px;height:8px;overflow:hidden;margin:8px 0}
    .prog-bar{height:100%;background:var(--red);border-radius:20px;transition:width .5s}

    /* ── STAT CARDS ──────────────── */
    .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
    @media(max-width:480px){.stats-row{grid-template-columns:repeat(2,1fr)}}
    .stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:16px;text-align:center}
    .stat-num{font-family:var(--ft);font-size:38px;font-weight:700;color:var(--red);line-height:1}
    .stat-label{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--gray);margin-top:4px}
    .stat-sub{font-size:11px;color:var(--gray);margin-top:3px}

    /* ── AVATAR ──────────────────── */
    .avatar-wrap{position:relative;width:120px;margin:0 auto 12px}
    .avatar-circle{width:120px;height:120px;border-radius:50%;border:3px solid var(--red);background:var(--bg3);display:flex;align-items:center;justify-content:center;font-family:var(--ft);font-size:40px;font-weight:700;color:var(--red);overflow:hidden}
    .avatar-circle img{width:100%;height:100%;object-fit:cover}
    .avatar-cam{position:absolute;bottom:4px;right:4px;width:32px;height:32px;border-radius:50%;background:var(--red);border:2px solid var(--bg);display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer}

    /* ── HISTORY ITEMS ───────────── */
    .hist-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:14px;gap:8px}
    .hist-item:last-child{border-bottom:none}
    .hist-icon{font-size:16px;flex-shrink:0}

    /* ── PLAN LIST ───────────────── */
    .plan-header{
      background:var(--bg2);border:1px solid var(--border);border-top:3px solid var(--red);
      border-radius:8px;padding:16px 18px;display:flex;justify-content:space-between;
      align-items:center;cursor:pointer;margin-bottom:1px;
    }
    .plan-header-title{font-family:var(--ft);font-size:14px;letter-spacing:2px;text-transform:uppercase;color:#fff}
    .plan-header-count{font-size:12px;color:var(--gray);margin-top:2px}
    .plan-body{background:var(--bg2);border:1px solid var(--border);border-top:none;border-radius:0 0 8px 8px;padding:0 18px}
    .plan-row{display:flex;align-items:baseline;gap:10px;padding:8px 0;border-bottom:1px solid #1a1a1a}
    .plan-row:last-child{border-bottom:none}
    .plan-num{font-family:'Oswald',sans-serif;font-size:18px;font-weight:700;flex-shrink:0;width:26px;line-height:1}
    .plan-desc{font-size:13px}

    /* ── INFO FIELD ──────────────── */
    .info-field{margin-bottom:14px}
    .info-label{font-size:10px;color:var(--gray);letter-spacing:2px;text-transform:uppercase;margin-bottom:2px}
    .info-value{font-size:14px;word-break:break-all}

    /* ── MODAL ───────────────────── */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:2000;align-items:center;justify-content:center;padding:16px}
    .modal-overlay.open{display:flex}
    .modal-box{background:var(--bg2);border:1px solid var(--border);border-radius:10px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;padding:28px;position:relative}
    .modal-title{font-family:var(--ft);font-size:18px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:20px}
    .modal-close{position:absolute;top:14px;right:16px;background:transparent;border:none;color:var(--gray);font-size:20px}
    .modal-close:hover{color:#fff}

    /* ── BACK BTN ────────────────── */
    .back-btn{background:transparent;border:none;color:var(--red);font-family:var(--ft);font-size:13px;font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:0;display:inline-flex;align-items:center;gap:6px;margin-bottom:16px}
    .back-btn:hover{color:#fff}

    /* ── VENC CARD ───────────────── */
    .venc-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:12px}
    .venc-name{font-family:var(--ft);font-size:16px;font-weight:700;color:#fff}
    .venc-meta{font-size:12px;color:var(--gray);margin-top:2px}

    /* ── FILTER TABS ─────────────── */
    .filter-tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
    .filter-tab{padding:6px 14px;border-radius:20px;background:var(--bg3);border:1px solid var(--border);color:var(--gray);font-size:12px;font-weight:600;transition:all .2s}
    .filter-tab.active,.filter-tab:hover{background:var(--red);border-color:var(--red);color:#fff}

    /* ── SECTION LABEL ───────────── */
    .sec-label{font-family:var(--ft);font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--red);margin-bottom:6px}
    .sec-title{font-family:var(--ft);font-size:24px;font-weight:700;text-transform:uppercase;color:#fff;margin-bottom:20px}

    /* ── MISC ────────────────────── */
    .divider{border:none;border-top:1px solid var(--border);margin:18px 0}
    .text-gray{color:var(--gray)}
    .text-red{color:var(--red)}
    .text-green{color:var(--green)}
    .text-center{text-align:center}
    .mt-8{margin-top:8px} .mt-12{margin-top:12px} .mt-16{margin-top:16px}
    .mb-8{margin-bottom:8px} .mb-12{margin-bottom:12px} .mb-16{margin-bottom:16px}
    .flex{display:flex} .gap-8{gap:8px} .gap-12{gap:12px} .flex-wrap{flex-wrap:wrap}
  </style>
</head>
<body>

<!-- ── NAVBAR ─────────────────────────────────── -->
<nav id="navbar">
  <div class="nav-in">
    <a class="nav-logo" href="index.html"><img src="Logo_Pablo_giraldo.png" alt="PG"></a>
    <span class="nav-user" id="nav-user-txt"></span>
    <button class="nav-logout" onclick="logout()">Cerrar sesión</button>
    <button id="nav-burger" onclick="document.getElementById('nav-drawer').classList.toggle('open')">☰</button>
  </div>
</nav>

<div id="nav-drawer">
  <div id="nav-drawer-links"></div>
  <button style="color:var(--red);font-weight:700;" onclick="logout()">Cerrar sesión</button>
</div>

<!-- ── MODAL PAGO ──────────────────────────────── -->
<div class="modal-overlay" id="modal-pago">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal('modal-pago')">✕</button>
    <div class="modal-title">Registrar Pago</div>
    <input type="hidden" id="pago-aid">
    <div class="form-group"><label>Fecha</label><input type="date" id="p-fecha"></div>
    <div class="form-group"><label>Monto (COP)</label><input type="number" id="p-monto" placeholder="150000"></div>
    <div class="form-group"><label>Plan</label>
      <select id="p-plan">
        <option value="10_clases">10 Clases</option>
        <option value="15_clases">15 Clases</option>
        <option value="individual">Individual</option>
      </select>
    </div>
    <div class="form-group"><label>Notas</label><input type="text" id="p-notas" placeholder="Referencia, método..."></div>
    <button class="btn btn-primary btn-full mt-12" onclick="savePago()">Guardar pago</button>
  </div>
</div>

<!-- ── LOGIN ───────────────────────────────────── -->
<div id="screen-login">
  <a class="back-home" href="index.html">← INICIO</a>
  <div class="login-box">
    <div class="login-logo"><img src="Logo_Pablo_giraldo.png" alt="PG"></div>
    <p class="login-sub">Portal de Alumnos · Pablo Giraldo MMA</p>
    <div id="alert-login"></div>
    <div class="form-group"><label>Usuario / Documento</label>
      <input type="text" id="l-doc" placeholder="Tu documento de identidad" autocomplete="username">
    </div>
    <div class="form-group"><label>Contraseña</label>
      <input type="password" id="l-pass" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn btn-primary btn-full btn-lg mt-12" onclick="doLogin()">Entrar</button>
  </div>
</div>

<!-- ── APP ─────────────────────────────────────── -->
<div id="app">
  <div id="tab-bar"></div>
  <div id="tab-content"></div>
</div>

<script>
// ═══════════════════════════════════════════════
// SUPABASE
// ═══════════════════════════════════════════════
const { createClient } = supabase;
const sb = createClient(
  'https://wckurwybqwvsbqkfzmrd.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indja3Vyd3licXd2c2Jxa2Z6bXJkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzMjQ4NTcsImV4cCI6MjA5NzkwMDg1N30.TRgkfbMk8PudolXsLphlNGFSXXBHK0msBpeC1kh2Ftw'
);

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let S = null;          // session: {role, alumno?}
let adminTab = 'alumnos';
let alumnoTab = 'panel';
let detailAlumnoId = null;
let detailTab = 'perfil';

// ═══════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════
const $ = id => document.getElementById(id);
function today(){ return new Date().toISOString().split('T')[0]; }
function lastDOM(){
  const d=new Date(); return new Date(d.getFullYear(),d.getMonth()+1,0).toISOString().split('T')[0];
}
function fmtDate(s){
  if(!s) return '—';
  const d=new Date(s+'T12:00:00');
  return d.toLocaleDateString('es-CO',{day:'2-digit',month:'short',year:'numeric'});
}
function daysUntil(s){
  if(!s) return null;
  return Math.ceil((new Date(s+'T23:59:59')-new Date())/(864e5));
}
function planLabel(p){return{ten_clases:'10 Clases',clases_10:'10 Clases','10_clases':'10 Clases',clases_15:'15 Clases','15_clases':'15 Clases',individual:'Individual'}[p]||p||'—';}
function planClases(p){return{'10_clases':10,'15_clases':15,individual:1}[p]||0;}
function iniciales(n){if(!n)return'PG';return n.split(' ').map(w=>w[0]).join('').substr(0,2).toUpperCase();}
function closeModal(id){$(id).classList.remove('open');}
function openModal(id){$(id).classList.add('open');}
function showAlert(id,type,msg){
  const el=$(id); if(!el)return;
  el.innerHTML=`<div class="alert alert-${type}">${msg}</div>`;
}
function render(id,html){const el=$(id);if(el)el.innerHTML=html;}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
window.addEventListener('DOMContentLoaded',()=>{
  const saved=localStorage.getItem('pg_s');
  if(saved){try{S=JSON.parse(saved);startApp();}catch{showLogin();}}
  else showLogin();
});

function showLogin(){
  $('screen-login').style.display='flex';
  $('app').style.display='none';
  $('navbar').style.display='none';
}

function startApp(){
  $('screen-login').style.display='none';
  $('app').style.display='block';
  $('navbar').style.display='flex';
  $('nav-user-txt').textContent = S.role==='admin' ? 'Admin · Pablo' : (S.alumno?.nombre||'');
  buildNav();
  if(S.role==='admin') renderAdminTab(adminTab);
  else renderAlumnoTab(alumnoTab);
}

// ═══════════════════════════════════════════════
// LOGIN / LOGOUT
// ═══════════════════════════════════════════════
async function doLogin(){
  const doc=$('l-doc').value.trim(), pass=$('l-pass').value.trim();
  showAlert('alert-login','','');
  if(!doc||!pass){showAlert('alert-login','error','Completa todos los campos.');return;}

  if(doc==='1011089763'&&pass==='amoaDios23'){
    S={role:'admin'};
    localStorage.setItem('pg_s',JSON.stringify(S));
    startApp(); return;
  }

  const{data,error}=await sb.from('alumnos').select('*')
    .eq('documento',doc).eq('pass_alumno',pass).maybeSingle();
  if(!data){showAlert('alert-login','error','Documento o contraseña incorrectos.');return;}
  S={role:'alumno',alumno:data};
  localStorage.setItem('pg_s',JSON.stringify(S));
  startApp();
}

function logout(){
  S=null; localStorage.removeItem('pg_s');
  adminTab='alumnos'; alumnoTab='panel';
  detailAlumnoId=null;
  showLogin();
}

// ═══════════════════════════════════════════════
// NAV
// ═══════════════════════════════════════════════
function buildNav(){
  const tabs=S.role==='admin'
    ?[{id:'alumnos',icon:'👥',label:'Alumnos'},{id:'agregar',icon:'➕',label:'Agregar'},{id:'vencimientos',icon:'⏰',label:'Vences'}]
    :[{id:'panel',icon:'🏠',label:'Mi Panel'},{id:'plan',icon:'📋',label:'Mi Plan'},{id:'clases',icon:'📅',label:'Clases'},{id:'pagos',icon:'💳',label:'Pagos'},{id:'perfil',icon:'👤',label:'Perfil'}];

  $('tab-bar').innerHTML=tabs.map(t=>`
    <button class="tab-btn ${S.role==='admin'?adminTab===t.id:alumnoTab===t.id?'active':''}" onclick="${S.role==='admin'?`renderAdminTab('${t.id}')`:`renderAlumnoTab('${t.id}')`}">
      <span class="tab-icon">${t.icon}</span>${t.label}
    </button>`).join('');

  const drawerLinks=tabs.map(t=>`<a href="#" onclick="${S.role==='admin'?`renderAdminTab('${t.id}')`:`renderAlumnoTab('${t.id}')`};$('nav-drawer').classList.remove('open');return false;">${t.icon} ${t.label}</a>`).join('');
  $('nav-drawer-links').innerHTML=drawerLinks;
}

function setTabActive(id,role){
  document.querySelectorAll('.tab-btn').forEach(b=>{
    b.classList.toggle('active',b.textContent.includes(id)||b.getAttribute('onclick').includes(`'${id}'`));
  });
}

// ═══════════════════════════════════════════════
// ═══ ADMIN PANEL ═══════════════════════════════
// ═══════════════════════════════════════════════
function renderAdminTab(tab){
  adminTab=tab; detailAlumnoId=null;
  buildNav();
  if(tab==='alumnos') renderAdminAlumnos();
  else if(tab==='agregar') renderAdminForm(null);
  else if(tab==='vencimientos') renderAdminVencimientos();
}

// ── LISTA ALUMNOS ─────────────────────────────
async function renderAdminAlumnos(){
  render('tab-content','<p class="text-gray" style="padding:20px">Cargando...</p>');
  const{data:list}=await sb.from('alumnos').select('*').order('nombre');

  const cards=(list||[]).map(a=>{
    const rest=(a.clases_total||0)-(a.clases_tomadas||0);
    const dias=daysUntil(a.vencimiento);
    const vencido=dias!==null&&dias<0;
    const urgente=dias!==null&&dias<=7&&dias>=0;
    const av=a.foto_url?`<img src="${a.foto_url}" alt="">`:`<span>${iniciales(a.nombre)}</span>`;
    const diasTxt=dias===null?'—':vencido?`Venció hace ${Math.abs(dias)}d`:dias===0?'Vence hoy':`${dias}d`;
    const diasColor=vencido?'color:var(--red)':urgente?'color:var(--yellow)':'color:var(--gray)';
    const badge=(vencido||urgente)?`<span class="badge badge-${vencido?'red':'yellow'}" style="font-size:9px;">${vencido?'Vencido':'⚠ Pronto'}</span>`:'';
    return `
      <div class="alumno-card" onclick="openDetalleAlumno('${a.id}','perfil')">
        <div class="a-avatar">${av}</div>
        <div class="a-info">
          <div class="a-name">${a.nombre} ${badge}</div>
          <div class="a-meta">${planLabel(a.plan)} · ${a.horario_dia||'Sin horario'}</div>
        </div>
        <div class="a-right">
          <div class="a-clases">${rest}</div>
          <div class="a-dias" style="${diasColor}">${diasTxt}</div>
        </div>
      </div>`;
  }).join('') || '<p class="text-gray" style="padding:20px;">No hay alumnos registrados.</p>';

  render('tab-content',`
    <div class="sec-label">Panel Admin</div>
    <div class="sec-title" style="margin-bottom:12px;">Alumnos</div>
    <div style="margin-bottom:16px;">
      <button class="btn btn-primary" onclick="renderAdminTab('agregar')">➕ Agregar alumno</button>
    </div>
    ${cards}`);
}

// ── DETALLE ALUMNO ────────────────────────────
function openDetalleAlumno(id, tab){
  detailAlumnoId=id;
  detailTab=tab||'perfil';
  renderDetalleAlumno();
}

async function renderDetalleAlumno(){
  const id=detailAlumnoId;
  render('tab-content','<p class="text-gray" style="padding:20px;">Cargando...</p>');

  const{data:a}=await sb.from('alumnos').select('*').eq('id',id).single();
  if(!a) return;

  const tabs=[
    {id:'perfil',label:'Perfil'},
    {id:'progreso',label:'Progreso'},
    {id:'individual',label:'Individual'},
    {id:'clases',label:'Clases'},
    {id:'pagos',label:'Pagos'},
    {id:'notas',label:'Notas'},
  ];

  const subTabBar=`<div id="sub-tabs">${tabs.map(t=>`
    <button class="sub-tab-btn ${detailTab===t.id?'active':''}" onclick="detailTab='${t.id}';renderDetalleAlumno();">${t.label}</button>`).join('')}</div>`;

  let body='';

  if(detailTab==='perfil') body=await buildDetallePeril(a);
  else if(detailTab==='progreso') body=await buildDetalleProgreso(a);
  else if(detailTab==='individual') body=await buildDetalleIndividual(a);
  else if(detailTab==='clases') body=await buildDetalleClases(a);
  else if(detailTab==='pagos') body=await buildDetallePagos(a);
  else if(detailTab==='notas') body=buildDetalleNotas(a);

  render('tab-content',`
    <button class="back-btn" onclick="renderAdminAlumnos()">← Volver</button>
    <div class="sec-title" style="margin-bottom:6px;">${a.nombre}</div>
    ${subTabBar}
    ${body}`);
}

async function buildDetallePeril(a){
  const av=a.foto_url
    ?`<img src="${a.foto_url}" alt="">`
    :`<span>${iniciales(a.nombre)}</span>`;
  return `
    <div class="card" style="text-align:center;">
      <div class="avatar-wrap">
        <div class="avatar-circle">${av}</div>
        <label for="foto-adm" class="avatar-cam">📷</label>
        <input type="file" id="foto-adm" accept="image/*" style="display:none" onchange="subirFotoAdmin(this,'${a.id}')">
      </div>
      <div id="foto-adm-msg" style="font-size:12px;min-height:14px;margin-bottom:6px;"></div>
      <div style="font-family:var(--ft);font-size:20px;font-weight:700;">${a.nombre}</div>
      <div style="margin-top:6px;"><span class="badge badge-red">${planLabel(a.plan)}</span></div>
      <button class="btn btn-secondary btn-sm mt-12" onclick="renderAdminFormWithId('${a.id}')">✏️ Editar alumno</button>
    </div>
    <div class="card mt-12">
      <div class="card-title">Info personal</div>
      ${infoF('Documento',a.documento)}
      ${infoF('Celular',a.celular)}
      ${infoF('Correo',a.correo)}
      ${infoF('Nacimiento',fmtDate(a.nacimiento))}
      ${infoF('Horario',`${a.horario_dia||'—'} ${a.horario_hora||''}`)}
      ${infoF('Vencimiento',fmtDate(a.vencimiento))}
    </div>`;
}

// ── CLASES INDIVIDUALES (ADMIN) ───────────────
let _indFormOpen = false;

async function buildDetalleIndividual(a){
  const{data:list}=await sb.from('clases_individuales').select('*')
    .eq('alumno_id',a.id).order('fecha',{ascending:false});

  const formHtml=`
    <div id="ind-form" style="display:none;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:20px;margin-bottom:16px;">
      <div class="card-title mb-12">Nueva clase individual</div>
      <div class="form-row">
        <div class="form-group"><label>Fecha</label><input type="date" id="ind-fecha" value="${today()}"></div>
        <div class="form-group"><label>Hora</label><input type="time" id="ind-hora" value="06:00"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Disciplina</label><input type="text" id="ind-disc" placeholder="Jiu Jitsu, MMA, Boxeo..."></div>
        <div class="form-group"><label>Monto (COP)</label><input type="number" id="ind-monto" placeholder="80000"></div>
      </div>
      <div class="form-group"><label>Notas (opcional)</label><input type="text" id="ind-notas" placeholder="Observaciones..."></div>
      <div class="flex gap-8 mt-12">
        <button class="btn btn-primary btn-sm" onclick="saveClaseIndividual('${a.id}')">Guardar clase</button>
        <button class="btn btn-secondary btn-sm" onclick="$('ind-form').style.display='none'">Cancelar</button>
      </div>
    </div>`;

  const totalMonto=(list||[]).reduce((s,c)=>s+Number(c.monto||0),0);
  const pendiente=(list||[]).filter(c=>c.estado_pago==='pendiente');

  const cards=(list||[]).map(c=>{
    const isPend=c.estado_pago==='pendiente';
    const badgeHtml=isPend
      ?`<span class="badge badge-yellow">🟡 Pendiente</span>`
      :`<span class="badge badge-green">✅ Pagado${c.metodo_pago?' · '+c.metodo_pago:''}</span>`;

    const payBtn=isPend?`
      <div id="pay-${c.id}" style="margin-top:8px;display:none;">
        <div style="font-size:12px;color:var(--gray);margin-bottom:6px;">Método de pago:</div>
        <div class="flex gap-8 flex-wrap">
          ${['Efectivo','Nequi','Transferencia','PayPal'].map(m=>
            `<button class="btn btn-secondary btn-sm" onclick="pagarClaseInd('${c.id}','${m}','${a.id}')">${m}</button>`
          ).join('')}
        </div>
      </div>
      <button class="btn btn-yellow btn-sm mt-8" onclick="document.getElementById('pay-${c.id}').style.display=document.getElementById('pay-${c.id}').style.display==='none'?'block':'none'">Marcar como pagado</button>`:'';

    return `
      <div style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:10px;">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;">
          <div>
            <div style="font-family:var(--ft);font-size:16px;font-weight:700;color:#fff;">${c.disciplina||'—'}</div>
            <div style="font-size:12px;color:var(--gray);margin-top:2px;">${fmtDate(c.fecha)} ${c.hora?'· '+c.hora:''}</div>
            <div style="font-size:13px;color:var(--white);margin-top:4px;">$${Number(c.monto||0).toLocaleString('es-CO')}</div>
            ${c.notas?`<div style="font-size:12px;color:var(--gray);margin-top:2px;">${c.notas}</div>`:''}
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
            ${badgeHtml}
            <button class="btn btn-secondary btn-sm" style="color:var(--red);font-size:18px;padding:4px 8px;" onclick="eliminarClaseInd('${c.id}','${a.id}')">🗑</button>
          </div>
        </div>
        ${payBtn}
      </div>`;
  }).join('')||'<p class="text-gray" style="padding:12px 0;">Sin clases individuales registradas.</p>';

  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <div>
        <div style="font-family:var(--ft);font-size:13px;color:var(--gray);">Total cobrado: <strong style="color:#fff;">$${totalMonto.toLocaleString('es-CO')}</strong></div>
        ${pendiente.length?`<div style="font-size:12px;color:var(--yellow);">⚠ ${pendiente.length} clase(s) con pago pendiente</div>`:''}
      </div>
      <button class="btn btn-primary btn-sm" onclick="$('ind-form').style.display=$('ind-form').style.display==='none'?'block':'none'">+ Registrar clase individual</button>
    </div>
    ${formHtml}
    ${cards}`;
}

async function saveClaseIndividual(alumnoId){
  const fecha=$('ind-fecha').value, hora=$('ind-hora').value;
  const disc=($('ind-disc').value||'').trim(), monto=$('ind-monto').value;
  if(!fecha||!disc){alert('Fecha y disciplina son obligatorios.');return;}
  const{error}=await sb.from('clases_individuales').insert({
    alumno_id:alumnoId, fecha, hora:hora||null,
    disciplina:disc, monto:Number(monto)||0,
    notas:($('ind-notas').value||'').trim()||null,
    estado_pago:'pendiente',
  });
  if(error){alert(error.message);return;}
  $('ind-form').style.display='none';
  openDetalleAlumno(alumnoId,'individual');
}

async function pagarClaseInd(claseId, metodo, alumnoId){
  await sb.from('clases_individuales').update({estado_pago:'pagado',metodo_pago:metodo}).eq('id',claseId);
  openDetalleAlumno(alumnoId,'individual');
}

async function eliminarClaseInd(claseId, alumnoId){
  if(!confirm('¿Eliminar esta clase individual?')) return;
  await sb.from('clases_individuales').delete().eq('id',claseId);
  openDetalleAlumno(alumnoId,'individual');
}

async function buildDetalleProgreso(a){
  const rest=(a.clases_total||0)-(a.clases_tomadas||0);
  const pct=a.clases_total?Math.round((a.clases_tomadas/a.clases_total)*100):0;
  const dias=daysUntil(a.vencimiento);
  const vencido=dias!==null&&dias<0;
  return `
    <div class="stats-row">
      <div class="stat-card"><div class="stat-num">${rest}</div><div class="stat-label">Restantes</div></div>
      <div class="stat-card"><div class="stat-num" style="color:#fff;">${a.clases_tomadas||0}</div><div class="stat-label">Tomadas</div></div>
      <div class="stat-card"><div class="stat-num" style="font-size:26px;color:${vencido?'var(--red)':'#fff'}">${dias!==null?(vencido?'Vencido':dias+'d'):'—'}</div><div class="stat-label">Vencimiento</div><div class="stat-sub">${fmtDate(a.vencimiento)}</div></div>
    </div>
    <div class="card mb-12">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <span class="text-gray" style="font-size:13px;">Progreso del plan</span>
        <span style="font-family:var(--ft);font-size:18px;font-weight:700;color:var(--red);">${pct}%</span>
      </div>
      <div class="prog-wrap"><div class="prog-bar" style="width:${pct}%"></div></div>
      <div style="font-size:12px;color:var(--gray);margin-top:5px;">${a.clases_tomadas||0} de ${a.clases_total||0} clases</div>
    </div>
    <div class="card mb-12">
      <div class="card-title">Registrar clase</div>
      <div class="flex gap-8 flex-wrap">
        <button class="btn btn-green" onclick="marcarClase('${a.id}',false)">✓ Clase tomada</button>
        <button class="btn btn-yellow" onclick="marcarClase('${a.id}',true)">⚠ Cancelación tardía</button>
        <button class="btn btn-secondary btn-sm" onclick="registrarClaseIndividual('${a.id}')">➕ Clase individual</button>
        <button class="btn btn-secondary btn-sm" onclick="openModalPago('${a.id}')">💰 Registrar pago</button>
      </div>
    </div>
    ${buildPlanHTML(a)}`;
}

async function buildDetalleClases(a){
  const{data:list}=await sb.from('confirmaciones').select('*')
    .eq('alumno_id',a.id).order('fecha',{ascending:false}).limit(50);
  const rows=(list||[]).map(c=>{
    const icon=c.estado==='asistio'?'✅':c.estado==='confirmada'?'🔵':c.estado==='aplazada'?'⚠️':c.estado==='individual'?'🟣':'❌';
    const color=c.estado==='asistio'?'var(--green)':c.estado==='individual'?'#a855f7':c.estado==='aplazada'?'var(--yellow)':c.estado==='cancelada_tardia'?'var(--red)':'var(--gray)';
    return `<div class="hist-item">
      <span class="hist-icon">${icon}</span>
      <span style="flex:1;font-size:13px;color:${color};text-transform:capitalize;">${c.estado.replace('_',' ')}</span>
      <span style="font-size:12px;color:var(--gray);">${fmtDate(c.fecha)}</span>
      ${c.nota?`<span style="font-size:11px;color:var(--gray);">— ${c.nota}</span>`:''}
    </div>`;
  }).join('')||'<p class="text-gray" style="padding:16px 0;">Sin historial de clases.</p>';
  return `<div class="card">${rows}</div>`;
}

async function buildDetallePagos(a){
  const{data:list}=await sb.from('pagos').select('*').eq('alumno_id',a.id).order('fecha',{ascending:false});
  const total=(list||[]).reduce((s,p)=>s+Number(p.monto||0),0);
  const rows=(list||[]).map(p=>`
    <div class="hist-item">
      <span style="flex:1;font-size:14px;"><strong>$${Number(p.monto).toLocaleString('es-CO')}</strong> <span class="text-gray">· ${planLabel(p.plan)}</span></span>
      <span style="font-size:12px;color:var(--gray);">${fmtDate(p.fecha)}</span>
    </div>`).join('')||'<p class="text-gray" style="padding:16px 0;">Sin pagos registrados.</p>';
  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <button class="btn btn-primary btn-sm" onclick="openModalPago('${a.id}')">💰 Registrar pago</button>
      ${total?`<span style="font-size:13px;color:var(--gray);">Total: <strong>$${total.toLocaleString('es-CO')}</strong></span>`:''}
    </div>
    <div class="card">${rows}</div>`;
}

function buildDetalleNotas(a){
  return `<div class="card">
    <div class="card-title">Notas del entrenador</div>
    <textarea id="notas-ta" style="width:100%;background:#1a1a1a;border:1px solid #333;color:#fff;padding:12px;border-radius:5px;font-family:var(--fb);font-size:14px;resize:vertical;min-height:200px;">${a.notas||''}</textarea>
    <button class="btn btn-secondary mt-12" onclick="saveNotas('${a.id}')">Guardar notas</button>
  </div>`;
}

async function saveAlumno(){
  const id=$('f-id').value;
  const nombre=($('f-nombre').value||'').trim();
  const doc=($('f-doc').value||'').trim();
  const plan=$('f-plan').value;
  const pass=($('f-pass').value||'').trim();
  showAlert('alert-form','','');
  if(!nombre||!doc||!plan||!pass){showAlert('alert-form','error','Nombre, documento, plan y contraseña son obligatorios.');return;}

  const payload={
    nombre, documento:doc, correo:($('f-correo').value||'').trim(),
    celular:($('f-celular').value||'').trim(), nacimiento:$('f-nac').value||null,
    plan, clases_total:parseInt($('f-total').value)||planClases(plan),
    extra_clases_tomadas:parseInt($('f-extra').value)||0,
    horario_dia:$('f-dia').value, horario_hora:($('f-hora').value||'').trim(),
    vencimiento:$('f-venc').value||null, pass_alumno:pass,
    plan_clases:($('f-planc').value||'').trim(), notas:($('f-notas').value||'').trim(),
  };

  let error;
  if(id){({error}=await sb.from('alumnos').update(payload).eq('id',id));}
  else{payload.clases_tomadas=0;({error}=await sb.from('alumnos').insert(payload));}

  if(error){showAlert('alert-form','error',error.message);return;}
  renderAdminTab('alumnos');
}

async function renderAlumnoClases(){
  render('tab-content','<p class="text-gray" style="padding:20px;">Cargando...</p>');
  const a=await getAlumnoFresh();

  const[{data:confs},{data:inds}]=await Promise.all([
    sb.from('confirmaciones').select('*').eq('alumno_id',a.id).order('fecha',{ascending:false}),
    sb.from('clases_individuales').select('*').eq('alumno_id',a.id).order('fecha',{ascending:false}),
  ]);

  // Unify: confirmaciones + individuales
  const unified=[
    ...(confs||[]).map(c=>({_tipo:'plan',fecha:c.fecha,hora:null,disciplina:null,estado:c.estado,_raw:c})),
    ...(inds||[]).map(c=>({_tipo:'individual',fecha:c.fecha,hora:c.hora,disciplina:c.disciplina,estado:c.estado_pago==='pagado'?'completada':'programada',_raw:c})),
  ].sort((a,b)=>b.fecha.localeCompare(a.fecha));

  const renderListFn=(items)=>{
    const rows=items.map(c=>{
      if(c._tipo==='individual'){
        const icon=c.estado==='completada'?'🟣':'📅';
        const color=c.estado==='completada'?'#a855f7':'var(--yellow)';
        const estadoLabel=c.estado==='completada'?'Completada':'Programada';
        return `<div class="hist-item">
          <span class="hist-icon">${icon}</span>
          <span style="flex:1;font-size:13px;">
            <span style="color:${color};">${estadoLabel}</span>
            <span class="text-gray"> · ${c.disciplina||'Individual'}${c.hora?' · '+c.hora:''}</span>
          </span>
          <span style="font-size:12px;color:var(--gray);">${fmtDate(c.fecha)}</span>
        </div>`;
      }
      const icon=c.estado==='asistio'?'✅':c.estado==='confirmada'?'🔵':c.estado==='aplazada'?'⚠️':'❌';
      const color=c.estado==='asistio'?'var(--green)':c.estado==='aplazada'?'var(--yellow)':c.estado==='cancelada_tardia'?'var(--red)':'var(--gray)';
      return `<div class="hist-item">
        <span class="hist-icon">${icon}</span>
        <span style="flex:1;font-size:13px;color:${color};text-transform:capitalize;">${c.estado.replace(/_/g,' ')}</span>
        <span style="font-size:12px;color:var(--gray);">${fmtDate(c.fecha)}</span>
      </div>`;
    }).join('')||'<p class="text-gray" style="padding:12px 0;">Sin registros.</p>';
    $('clases-list').innerHTML=rows;
  };

  render('tab-content',`
    <div class="sec-title">Mis Clases</div>
    <div class="filter-tabs">
      <button class="filter-tab active" id="ft-todas" onclick="_clasesFilter('todas')">Todas</button>
      <button class="filter-tab" id="ft-plan" onclick="_clasesFilter('plan')">Plan ✅</button>
      <button class="filter-tab" id="ft-ind" onclick="_clasesFilter('individual')">Individuales 🟣</button>
    </div>
    <div class="card" id="clases-list"></div>`);

  window._clasesAll=unified;
  window._clasesFilter=function(tipo){
    document.querySelectorAll('.filter-tab').forEach(b=>b.classList.remove('active'));
    $('ft-'+tipo)?.classList.add('active');
    const filtered=tipo==='todas'?unified:unified.filter(c=>c._tipo===tipo);
    renderListFn(filtered);
  };
  renderListFn(unified);
}

function infoF(label,val){
  return `<div class="info-field">
    <div class="info-label">${label}</div>
    <div class="info-value">${val||'—'}</div>
  </div>`;

function buildPlanHTML(a){
  const src=(a.plan_clases||'').trim();
  if(!src) return '<div class="card"><p class="text-gray" style="font-size:13px;">Sin plan asignado.</p></div>';

  const lines=src.split('\n').map(l=>l.trim()).filter(l=>l);
  const tom=a.clases_tomadas||0;
  let total=0, rows='';

  for(const line of lines){
    const m=line.match(/^Clase\s+(\d+)\s*[—–-]?\s*(.*)/i);
    if(m){
      const num=parseInt(m[1]),desc=m[2]||'';
      total=Math.max(total,num);
      const done=tom>=num,next=tom===num-1;
      const nextId=next?`id="plan-next"`:''
      rows+=`<div ${nextId} class="plan-row">
        <span class="plan-num" style="color:${done?'var(--green)':next?'var(--red)':'#444'}">${num}</span>
        <span class="plan-desc" style="color:${done?'var(--green)':next?'#fff':'#555'};font-weight:${next?700:400};text-decoration:${done?'line-through':'none'};">${done?'✅ ':next?'▶ ':''}${desc}</span>
      </div>`;
    } else if(line.endsWith(':')||line===line.toUpperCase()&&line.length>3){
      rows+=`<p style="font-family:var(--ft);font-size:10px;letter-spacing:3px;color:var(--red);text-transform:uppercase;margin:14px 0 6px;">${line}</p>`;
    } else {
      rows+=`<p style="color:var(--gray);font-size:13px;margin:4px 0;">${line}</p>`;
    }
  }

  const uid=S.role==='admin'?'adm':'alm';
  return `
    <div class="plan-header" onclick="(function(){const b=$('pb-${uid}'),ar=$('pa-${uid}'),o=b.style.display!=='none';b.style.display=o?'none':'block';ar.textContent=o?'▼':'▲';if(!o){const nx=$('plan-next');if(nx)setTimeout(()=>nx.scrollIntoView({behavior:'smooth',block:'center'}),100);}})()">
      <div>
        <div class="plan-header-title">Plan de entrenamiento</div>
        <div class="plan-header-count">${tom} / ${total} completadas</div>
      </div>
      <span id="pa-${uid}" style="color:var(--red);">▼</span>
    </div>
    <div class="plan-body" id="pb-${uid}" style="display:none;">${rows}</div>`;
}

async function marcarClase(alumnoId,esCancelacion){
  const{data:a}=await sb.from('alumnos').select('clases_tomadas').eq('id',alumnoId).single();
  const nuevas=(a?.clases_tomadas||0)+1;
  await sb.from('alumnos').update({clases_tomadas:nuevas}).eq('id',alumnoId);

  if(esCancelacion){
    await sb.from('confirmaciones').insert({alumno_id:alumnoId,fecha:today(),estado:'cancelada_tardia',nota:'Cancelación tardía'});
  } else {
    const{data:conf}=await sb.from('confirmaciones').select('id').eq('alumno_id',alumnoId).eq('estado','confirmada').order('fecha',{ascending:false}).limit(1).maybeSingle();
    if(conf) await sb.from('confirmaciones').update({estado:'asistio'}).eq('id',conf.id);
    else await sb.from('confirmaciones').insert({alumno_id:alumnoId,fecha:today(),estado:'asistio'});
  }
  const{data:alumno}=await sb.from('alumnos').select('*').eq('id',alumnoId).single();
  if(alumno) openDetalleAlumno(alumnoId,'progreso');
}

async function registrarClaseIndividual(alumnoId){
  const monto=prompt('Monto de la clase individual (COP):');
  if(monto===null) return;
  const{data:a}=await sb.from('alumnos').select('extra_clases_tomadas').eq('id',alumnoId).single();
  const extra=(a?.extra_clases_tomadas||0)+1;
  await sb.from('alumnos').update({extra_clases_tomadas:extra}).eq('id',alumnoId);
  await sb.from('confirmaciones').insert({alumno_id:alumnoId,fecha:today(),estado:'individual',nota:'Clase individual'});
  if(monto&&Number(monto)>0) await sb.from('pagos').insert({alumno_id:alumnoId,fecha:today(),monto:Number(monto),plan:'individual',notas:'Clase individual'});
  openDetalleAlumno(alumnoId,'progreso');
}

async function uploadFotoPerfil(alumnoId,file,containerId,msgId){
  if(!file) return;
  const el=$(containerId);
  if(el) el.style.opacity='0.4';
  const ext=file.name.split('.').pop().toLowerCase();
  const path=`${alumnoId}_${Date.now()}.${ext}`;
  const{error}=await sb.storage.from('fotos-alumnos').upload(path,file,{upsert:true});
  if(error){if(el)el.style.opacity='1';alert('Error: '+error.message);return;}
  const{data:ud}=sb.storage.from('fotos-alumnos').getPublicUrl(path);
  const foto_url=ud.publicUrl+'?t='+Date.now();
  await sb.from('alumnos').update({foto_url}).eq('id',alumnoId);
  if(S.role==='alumno'&&S.alumno.id===alumnoId){S.alumno.foto_url=foto_url;localStorage.setItem('pg_s',JSON.stringify(S));}
  if(el){el.style.opacity='1';el.innerHTML=`<img src="${foto_url}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;}
  const m=$(msgId);if(m){m.textContent='Foto actualizada ✓';m.style.color='var(--green)';}
}

function subirFoto(input){uploadFotoPerfil(S.alumno.id,input.files[0],'avatar-circle','foto-alm-msg');}
function subirFotoAdmin(input,alumnoId){
  const circle=document.querySelector(`#avatar-wrap-${alumnoId} .avatar-circle`)||$(`avatar-wrap-${alumnoId}`);
  uploadFotoPerfil(alumnoId,input.files[0],'foto-adm-circle','foto-adm-msg');
}

// Close modals on overlay click
document.querySelectorAll('.modal-overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');}));
</script>
